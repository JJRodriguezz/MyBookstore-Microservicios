events {}

http {

  upstream book_service {
    server book-service:3000;
  }

  upstream user_service {
    server user-service:3001;
  }

  upstream order_service {
    server order-service:3002;
  }

  upstream inventory_service {
    server inventory-service:3003;
  }

  upstream review_service {
    server review-service:3005;
  }

  upstream auth_service {
    server auth-service:3006;
  }

  server {
    listen 80;

    location /books {
      proxy_pass http://book_service;
    }

    location /users {
      proxy_pass http://user_service;
    }

    location /orders {
      proxy_pass http://order_service;
    }

    location /inventory {
      proxy_pass http://inventory_service;
    }

    location /reviews {
      proxy_pass http://review_service;
    }

    location /auth {
      proxy_pass http://auth_service;
    }
  }
}