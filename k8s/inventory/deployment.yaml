apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: bookstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: 061709796715.dkr.ecr.us-east-1.amazonaws.com/mybookstore-inventory-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
            - containerPort: 50054
          env:
            - name: PORT
              value: "3003"
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: db-password
            - name: DB_NAME
              value: inventorydb
