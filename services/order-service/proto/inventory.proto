syntax = "proto3";

package inventory;

service InventoryService {
  rpc CheckStock (StockRequest) returns (StockResponse);
  rpc DecreaseStock (StockRequest) returns (StockResponse);
}

message StockRequest {
  string book_id = 1;
}

message StockResponse {
  bool available = 1;
  int32 quantity = 2;
}