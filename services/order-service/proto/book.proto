syntax = "proto3";

package book;

service BookService {
  rpc GetBook (GetBookRequest) returns (BookResponse);
  rpc GetBooks (Empty) returns (BookList);
}

message GetBookRequest {
  string id = 1;
}

message BookResponse {
  string id = 1;
  string title = 2;
  string author = 3;
}

message BookList {
  repeated BookResponse books = 1;
}

message Empty {}