apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: bookstore
type: Opaque
stringData:
  db-user: "postgres"
  db-password: "your-secure-password-here"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: bookstore
type: Opaque
stringData:
  jwt-secret: "your-secure-jwt-secret-here"
